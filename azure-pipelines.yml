trigger:
- main

pool:
  name: 'windows'        # ← your self-hosted pool name
  # vmImage line removed — not needed for self-hosted

lockBehavior: sequential

steps:

- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '8.x'

- script: |
    echo "Running build..."
    dotnet build wrong.csproj > pipeline.log 2>&1
    echo Build exit code: %ERRORLEVEL%
    exit /b %ERRORLEVEL%
  displayName: 'Build .NET App'

- script: |
    echo "===== PIPELINE LOGS ====="
    type pipeline.log
  displayName: 'Print Logs'
  condition: failed()

- task: UsePythonVersion@0
  inputs:
    versionSpec: '3.x'
  condition: failed()

- script: |
    pip install requests
  displayName: 'Install Python deps'
  condition: failed()

- script: |
    python analyze_logs.py
  displayName: 'Run AI Log Analysis (Ollama)'
  condition: failed()
  # No env/API key needed — Ollama is local