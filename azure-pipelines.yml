trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

steps:

# Install .NET
- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '8.x'

# Build app
- script: |
    echo "Running build..."
    dotnet build wrong.csproj > pipeline.log 2>&1
    exit_code=$?

    echo "Build exit code: $exit_code"

    if [ $exit_code -ne 0 ]; then
      echo "Build failed, but continuing for AI analysis..."
    fi

    exit $exit_code
  displayName: 'Build .NET App'

# Setup Python
- task: UsePythonVersion@0
  inputs:
    versionSpec: '3.x'

# Install dependencies
- script: |
    python -m pip install --upgrade pip
    pip install openai
  displayName: 'Install Python dependencies'
  condition: failed()

# Run AI log analysis
- script: |
    python analyze_logs.py
  env:
    OPENAI_API_KEY: $(OPENAI_API_KEY)
  displayName: 'Run AI Log Analysis'
  condition: failed()