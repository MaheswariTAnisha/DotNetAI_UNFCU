trigger:
- main

pool:
  name: 'windows'        # ← your self-hosted pool name
  # vmImage line removed — not needed for self-hosted

steps:

- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '8.x'

- script: |
    echo "Running build..."
    dotnet build wrong.csproj > pipeline.log 2>&1
    exit_code=$?
    if [ $exit_code -ne 0 ]; then
      echo "Build failed, running AI analysis..."
    fi
    exit $exit_code
  displayName: 'Build .NET App'

- script: |
    echo "===== PIPELINE LOGS ====="
    cat pipeline.log
  displayName: 'Print Logs'
  condition: failed()

- task: UsePythonVersion@0
  inputs:
    versionSpec: '3.x'
  condition: failed()

- script: |
    pip install requests
  displayName: 'Install Python deps'
  condition: failed()

- script: |
    python analyze_logs.py
  displayName: 'Run AI Log Analysis (Ollama)'
  condition: failed()
  # No env/API key needed — Ollama is local